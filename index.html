<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liêm Shop - Tra cứu đơn</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>LIÊM SHOP</h1>
        <p>Genshin Impact • Honkai: Star Rail</p>
    </div>

    <div class="search-box">

        <h2>Tra cứu đơn hàng</h2>

        <input
            type="text"
            id="orderCode"
            placeholder="Nhập mã đơn (VD: OPK728)"
        >

        <button onclick="searchOrder()">
            Tra cứu
        </button>

    </div>

    <div id="result" class="result">
    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
